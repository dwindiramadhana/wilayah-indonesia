version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: wilayah-indonesia-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wilayah_indonesia
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wilayah-indonesia-api
    ports:
      - "8000:8000"
    environment:
      DB_TYPE: postgres
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/wilayah_indonesia?sslmode=disable
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
