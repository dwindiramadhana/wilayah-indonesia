version: '3.8'

# Production Docker Compose for Indonesian Regions Fuzzy Search API
# Uses PostgreSQL with pgvector and native FTS

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: wilayah-indonesia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wilayah_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-wilayah_indonesia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wilayah_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wilayah-network
    # Optional: Expose port for external access (disable in production if not needed)
    # ports:
    #   - "5432:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wilayah-indonesia-api
    restart: unless-stopped
    environment:
      DB_TYPE: postgres
      DATABASE_URL: ${DATABASE_URL}
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wilayah-network
    ports:
      - "8083:8000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  wilayah-network:
    driver: bridge
